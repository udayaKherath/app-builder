<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
    <!-- UI will be styled by styles.css -->
    <!-- Behavior will be attached by script.js -->
</head>
<body>
    <div class="calculator">
        <!-- Display for current input/result -->
        <input type="text" id="display" class="display" readonly aria-label="Calculator display">
        <div class="buttons">
            <!-- Row 1 -->
            <button class="button" data-value="C">C</button>
            <button class="button" data-value="←">←</button>
            <button class="button" data-value="/">/</button>
            <button class="button" data-value="*">*</button>
            <!-- Row 2 -->
            <button class="button" data-value="7">7</button>
            <button class="button" data-value="8">8</button>
            <button class="button" data-value="9">9</button>
            <button class="button" data-value="-">-</button>
            <!-- Row 3 -->
            <button class="button" data-value="4">4</button>
            <button class="button" data-value="5">5</button>
            <button class="button" data-value="6">6</button>
            <button class="button" data-value="+">+</button>
            <!-- Row 4 -->
            <button class="button" data-value="1">1</button>
            <button class="button" data-value="2">2</button>
            <button class="button" data-value="3">3</button>
            <button class="button equals" data-value="=">=</button>
            <!-- Row 5 -->
            <button class="button" data-value="0" style="grid-column: span 2;">0</button>
            <button class="button" data-value=".">.</button>
        </div>
    </div>
</body>
</html>
